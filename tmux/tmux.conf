# Alex Wiltschko's tmux config (modernized from alexbw/dotfiles)

# Prefix: C-q
unbind C-b
set -g prefix C-q
bind q send-prefix
bind C-q last-window

# Modern terminal + colors
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -s escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1

# Vi keybindings everywhere
setw -g mode-keys vi
set -g status-keys vi

# Splits: v/s
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

# Pane navigation: hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize: HJKL
bind -r H resize-pane -L 3
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 3

# Window navigation: [ and ]
bind [ previous-window
bind ] next-window
bind -r S-Left swap-window -t -1
bind -r S-Right swap-window -t +1

# Copy mode
bind o copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# Reload config
bind r source ~/.tmux.conf \; display "Config reloaded"

# Display panes
bind w display-panes

# Sync panes toggle
bind e setw synchronize-panes on \; display "Sync ON"
bind E setw synchronize-panes off \; display "Sync OFF"

# Mouse
set -g mouse on

# Window sizing: use largest client, resize per-window
set -g window-size largest
setw -g aggressive-resize on

# Activity
setw -g monitor-activity on
set -g visual-activity off

# Automatic rename + truncate long names
setw -g automatic-rename on
setw -g automatic-rename-format "#{=24:pane_title}"

# Allow apps (e.g. Claude Code /rename) to set pane title via OSC sequences
set -g allow-passthrough on

# --- Status bar (minimal & clean) ---
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-position bottom

# Colors — muted palette on near-black
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#7aa2f7,fg=#1a1b26,bold"
set -g message-command-style "bg=#1a1b26,fg=#a9b1d6"

# Left: session pill with rounded caps
set -g status-left-length 40
set -g status-left "#[fg=#7aa2f7,bg=#1a1b26]#[fg=#1a1b26,bg=#7aa2f7,bold] #S #[fg=#7aa2f7,bg=#1a1b26] "

# Right: date + time pill
set -g status-right-length 50
set -g status-right "#[fg=#292e42,bg=#1a1b26]#[fg=#565f89,bg=#292e42] %a %d #[fg=#a9b1d6,bold] %H:%M #[fg=#292e42,bg=#1a1b26]"

# Window tabs — subtle inactive, clear active pill
setw -g window-status-format "#[fg=#565f89,bg=#1a1b26] #I:#W "
setw -g window-status-current-format "#[fg=#292e42,bg=#1a1b26]#[fg=#c0caf5,bg=#292e42,bold] #I:#W #[fg=#292e42,bg=#1a1b26]"
setw -g window-status-separator ""
setw -g window-status-activity-style "fg=#e0af68,bg=#1a1b26,none"
